name : Publish Package to Composer
on :
  release :
    types : [ published ]
jobs :
  publish :
    runs-on : ubuntu-latest
    steps :
      - uses : actions/checkout@v5
      - uses : actions/setup-node@v5
        with :
          node-version : '24'
      - run : npm install
      - run : npm run build
      - uses : shivammathur/setup-php@v2
        with :
          php-version : '8.5'
          tools : composer:v2
      - run : composer install
      - run : ./vendor/bin/pest
